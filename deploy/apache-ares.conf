<VirtualHost *:80>
    ServerName your-domain.com
    ServerAlias www.your-domain.com

    # Redirect all HTTP to HTTPS (recommended — uncomment after setting up SSL)
    # RewriteEngine On
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # ── Reverse proxy to Node.js ──────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket support (for future use)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/ares-error.log
    CustomLog ${APACHE_LOG_DIR}/ares-access.log combined
</VirtualHost>

# ── HTTPS (enable after running: certbot --apache -d your-domain.com) ─────────
# <VirtualHost *:443>
#     ServerName your-domain.com
#     SSLEngine on
#     # SSL cert paths filled in automatically by certbot
#
#     ProxyPreserveHost On
#     ProxyRequests Off
#     ProxyPass / http://127.0.0.1:3000/
#     ProxyPassReverse / http://127.0.0.1:3000/
