kind = "mobile"
previewPath = "/mobile/"
title = "A.R.E.S. Mobile"
version = "1.0.0"
id = "artifacts/ares-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21607
name = "expo"
paths = ["/mobile/"]

[services.development]
run = "pnpm --filter @workspace/ares-mobile run dev"

[services.env]
PORT = "21607"
BASE_PATH = "/mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ares-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/ares-mobile", "run", "serve"]
